<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#66e5ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur2"/>
      <feComposite in="SourceGraphic" in2="blur2" operator="over"/>
    </filter>
  </defs>
  
  <!-- Outer hexagon - subtle glow -->
  <polygon points="50,10 90,25 90,75 50,90 10,75 10,25" 
           fill="none" stroke="url(#neonGradient)" stroke-width="2" filter="url(#glow)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- Inner hexagon - solid -->
  <polygon points="50,20 80,35 80,65 50,80 20,65 20,35" 
           fill="url(#neonGradient)" filter="url(#innerGlow)">
    <animate attributeName="fill" values="#00d4ff;#66e5ff;#00d4ff" dur="4s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- Core dot - pulsing -->
  <circle cx="50" cy="50" r="8" fill="#00d4ff">
    <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Connection lines -->
  <line x1="50" y1="10" x2="50" y2="25" stroke="#00d4ff" stroke-width="1.5" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <line x1="90" y1="50" x2="75" y2="50" stroke="#00d4ff" stroke-width="1.5" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  </line>
  <line x1="50" y1="90" x2="50" y2="75" stroke="#00d4ff" stroke-width="1.5" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite" begin="1s"/>
  </line>
</svg>