<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#66e5ff"/>
    </linearGradient>
    <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0099cc" stop-opacity="0.8"/>
    </radialGradient>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feComposite in="SourceGraphic" in2="blur1" operator="over"/>
      <feComposite in="SourceGraphic" in2="blur2" operator="over"/>
    </filter>
    <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="pulseBlur"/>
      <feComposite in="SourceGraphic" in2="pulseBlur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background glow ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="5,5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="20s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Outer hexagon with strong glow -->
  <polygon points="50,15 85,30 85,70 50,85 15,70 15,30" 
           fill="none" stroke="url(#neonGradient)" stroke-width="3" filter="url(#strongGlow)" opacity="0.8">
    <animate attributeName="stroke-width" values="3;4;3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- Inner hexagon - solid with animation -->
  <polygon points="50,25 75,40 75,60 50,75 25,60 25,40" 
           fill="url(#neonGradient)" filter="url(#pulseGlow)">
    <animate attributeName="fill" values="#00d4ff;#66e5ff;#00d4ff" dur="4s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- Core with strong pulse -->
  <circle cx="50" cy="50" r="12" fill="url(#coreGradient)" filter="url(#strongGlow)">
    <animate attributeName="r" values="12;18;12" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.9;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Inner core - white hot spot -->
  <circle cx="50" cy="50" r="6" fill="#ffffff">
    <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Orbiting dots -->
  <circle cx="50" cy="50" r="30" fill="none">
    <circle r="3" fill="#00d4ff" filter="url(#strongGlow)">
      <animateMotion dur="8s" repeatCount="indefinite" path="M0,0 30,0"/>
      <animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite"/>
    </circle>
  </circle>
  
  <circle cx="50" cy="50" r="30" fill="none">
    <circle r="3" fill="#66e5ff" filter="url(#strongGlow)">
      <animateMotion dur="8s" repeatCount="indefinite" path="M0,0 -30,0" begin="2s"/>
      <animate attributeName="r" values="3;5;3" dur="4s" repeatCount="indefinite"/>
    </circle>
  </circle>
</svg>