<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#0099cc"/>
      <stop offset="100%" style="stop-color:#66e5ff"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <g filter="url(#neonGlow)">
    <text x="10" y="60" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" 
          font-size="48" font-weight="700" fill="url(#neonGradient)" 
          text-shadow="0 0 10px rgba(0, 212, 255, 0.7)">
      <tspan x="10" dy="0">Beasts</tspan>
      <tspan x="10" dy="48" fill="url(#neonGradient)" font-size="32">Network</tspan>
    </text>
    
    <!-- AI circuit pattern element -->
    <path d="M220 20 L240 20 L240 40 L260 40 L260 60 L240 60 L240 80 L220 80 Z" 
          fill="none" stroke="url(#neonGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="240" cy="20" r="3" fill="url(#neonGradient)"/>
    <circle cx="240" cy="40" r="3" fill="url(#neonGradient)"/>
    <circle cx="240" cy="60" r="3" fill="url(#neonGradient)"/>
    <circle cx="240" cy="80" r="3" fill="url(#neonGradient)"/>
  </g>
  
  <style>
    svg { background: transparent; }
  </style>
</svg>